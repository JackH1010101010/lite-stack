name: Generate & Deploy Sites

on:
  push:
    branches: [main]
  schedule:
    # Weekly rebuild every Sunday at 03:00 UTC — keeps SEO content fresh
    # and re-deploys with any new hotel inventory from LiteAPI
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Generate SEO pages for all sites
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for cfg in generator/configs/*.json; do
            name=$(basename "$cfg" .json)
            # Skip configs marked skip_deploy
            skip=$(node -e "const c=require('./$cfg');process.stdout.write(String(!!c.skip_deploy))")
            if [ "$skip" = "true" ]; then continue; fi
            echo "Generating SEO pages for $name..."
            node autoresearch/seo-pages.js --site "$name"
          done

      - name: Generate & deploy all sites
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          LITEAPI_KEY: ${{ secrets.LITEAPI_KEY }}
        run: node deploy-all.js

      - name: Weekly funnel digest (schedule runs only)
        if: github.event_name == 'schedule'
        env:
          POSTHOG_PERSONAL_KEY: ${{ secrets.POSTHOG_PERSONAL_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: node autoresearch/weekly-digest.js || echo "Digest failed (non-fatal)"

      - name: Booking reconciliation (schedule runs only)
        if: github.event_name == 'schedule'
        env:
          LITEAPI_KEY: ${{ secrets.LITEAPI_KEY }}
          POSTHOG_PERSONAL_KEY: ${{ secrets.POSTHOG_PERSONAL_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: node autoresearch/reconcile.js --days=7 || echo "Reconcile found anomalies (issue created)"
