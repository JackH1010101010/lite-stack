name: Generate & Deploy Sites

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly rebuild every Sunday at 03:00 UTC — keeps SEO content fresh
    # and re-deploys with any new hotel inventory from LiteAPI
    - cron: '0 3 * * 0'
    # Monthly jobs — hotel refresh + exploration loop (1st of each month at 04:00 UTC)
    - cron: '0 4 1 * *'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Generate SEO pages for all sites
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for cfg in generator/configs/*.json; do
            name=$(basename "$cfg" .json)
            echo "Generating SEO pages for $name..."
            node autoresearch/seo-pages.js --site "$name"
          done

      - name: Generate & deploy all sites
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          POSTHOG_PROJECT_KEY: ${{ secrets.POSTHOG_PROJECT_KEY }}
          LITEAPI_KEY: ${{ secrets.LITEAPI_KEY }}
        run: node deploy-all.js

      - name: Deploy luxstay SEO pages (generated by seo-pages.js)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          # luxstay uses skip_deploy=true so deploy-all.js skips it.
          # But we still generated SEO pages into sites/luxstay/ above.
          # Deploy them here so the live site has all SEO / sitemap pages.
          netlify deploy \
            --dir=sites/luxstay \
            --site=5936d2df-a89d-4554-a5eb-1a87078450fe \
            --prod \
            --auth=$NETLIFY_AUTH_TOKEN

      - name: Weekly funnel digest + GSC (Sundays only)
        if: github.event.schedule == '0 3 * * 0'
        env:
          POSTHOG_PERSONAL_KEY: ${{ secrets.POSTHOG_PERSONAL_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          GH_TOKEN: ${{ github.token }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URLS: ${{ secrets.GSC_SITE_URLS }}
        run: node autoresearch/weekly-digest.js || echo "Digest failed (non-fatal)"

      - name: Booking reconciliation (Sundays only)
        if: github.event.schedule == '0 3 * * 0'
        env:
          LITEAPI_KEY: ${{ secrets.LITEAPI_KEY }}
          POSTHOG_PERSONAL_KEY: ${{ secrets.POSTHOG_PERSONAL_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: node autoresearch/reconcile.js --days=7 || echo "Reconcile found anomalies (issue created)"

  # ── Monthly jobs (1st of each month at 04:00 UTC) ──────────
  monthly:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 1 * *'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Hotel inventory refresh
        env:
          LITEAPI_KEY: ${{ secrets.LITEAPI_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node autoresearch/hotel-refresh.js || echo "Hotel refresh failed (non-fatal)"

      - name: Market exploration loop
        env:
          LITEAPI_KEY: ${{ secrets.LITEAPI_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URLS: ${{ secrets.GSC_SITE_URLS }}
        run: node autoresearch/explore.js || echo "Explore failed (non-fatal)"
