# Netlify config for luxstay (monorepo)
# Netlify project settings: base dir = repo root, publish = sites/luxstay
[build]
  publish = "sites/luxstay"
  command = "node generator/generate.js luxstay && sed -i \"s/YOUR_POSTHOG_KEY/${POSTHOG_PROJECT_KEY}/g\" sites/luxstay/index.html"

[build.environment]
  NODE_VERSION = "18"
  AWS_LAMBDA_JS_RUNTIME = "nodejs18.x"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Serve static HTML pages and guides directly (Netlify checks for files
# before applying redirects only when force=false, which is the default
# for status 200 rewrites). Setting force = false explicitly ensures
# existing files like /guides/*/index.html are served as-is.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
