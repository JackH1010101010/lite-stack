# Netlify config for maldives-escape (monorepo)
# Netlify project settings: base dir = repo root, publish = sites/maldives-escape
[build]
  publish = "sites/maldives-escape"
  command = "node generator/generate.js maldives-escape && sed -i \"s/YOUR_POSTHOG_KEY/${POSTHOG_PROJECT_KEY}/g\" sites/maldives-escape/index.html"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
