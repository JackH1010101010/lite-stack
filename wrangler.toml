# Cloudflare Worker configuration for LuxStay
# worker.js handles /api/liteapi proxy + static asset passthrough
# Static assets are served from sites/luxstay/ after build

name = "luxstay"
main = "worker.js"
compatibility_date = "2024-09-23"

[assets]
directory = "sites/luxstay"

# LITEAPI_KEY must be set as a secret via:
#   npx wrangler secret put LITEAPI_KEY
# or in the Cloudflare dashboard under Settings → Variables and Secrets
